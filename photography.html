<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography - The Eternal Tao</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DotGothic16&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .photo-gallery-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 40px;
        }

        .photo-gallery-title {
            font-family: 'Press Start 2P', monospace;
            font-size: 2rem;
            color: white;
            text-align: center;
            margin-bottom: 50px;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-bottom: 50px;
        }

        .photo-item {
            position: relative;
            width: 100%;
            padding-bottom: 100%; /* Square aspect ratio */
            overflow: hidden;
            background: #1a1a1a;
            border: 2px solid #333;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .photo-item:hover {
            border-color: #ff6600;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255, 102, 0, 0.3);
        }

        .photo-item img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .photo-item:hover img {
            transform: scale(1.05);
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 50px;
        }

        .pagination button,
        .pagination .page-number {
            font-family: 'Press Start 2P', monospace;
            background: linear-gradient(45deg, #ff6600, #ff8800);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .pagination button:hover {
            background: linear-gradient(45deg, #ff0000, #ff6600);
            transform: translateY(-2px);
        }

        .pagination button:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
            transform: none;
        }

        .pagination .page-number {
            background: #1a1a1a;
            border: 2px solid #ff6600;
            padding: 10px 18px;
            cursor: default;
        }

        .pagination .page-number.active {
            background: linear-gradient(45deg, #ff6600, #ff8800);
        }

        /* Lightbox for full-size photo view */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        .lightbox-close {
            position: absolute;
            top: 30px;
            right: 40px;
            font-family: 'Press Start 2P', monospace;
            font-size: 2rem;
            color: white;
            background: none;
            border: none;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .lightbox-close:hover {
            color: #ff6600;
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
            .photo-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .photo-gallery-title {
                font-size: 1.2rem;
            }

            .pagination {
                flex-wrap: wrap;
                gap: 10px;
            }

            .pagination button,
            .pagination .page-number {
                font-size: 0.6rem;
                padding: 10px 15px;
            }
        }
    </style>
</head>
<body>
    <!-- Header and Legal Window loaded by header.js -->

    <div class="main-container">
        <div class="photo-gallery-container">
            <h1 class="photo-gallery-title">Photography</h1>
            
            <div class="photo-grid" id="photoGrid">
                <!-- Photos will be loaded by JavaScript -->
            </div>

            <div class="pagination" id="pagination">
                <!-- Pagination will be loaded by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Lightbox for full-size view -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightboxClose">×</button>
        <img src="" alt="Full size photo" id="lightboxImg">
    </div>

    <!-- Load JavaScript -->
    <script src="js/header.js"></script>
    <script src="js/main.js"></script>
    <script>
        // Photo Gallery Data
        // FULLY AUTOMATIC: Just upload photos named photo1.jpg, photo2.jpg, photo3.jpg, etc.
        // The code will automatically find the highest number and display newest first
        
        let allPhotos = [];
        let currentPage = 1;
        const photosPerPage = 9;
        let photosLoaded = false;

        // Auto-detect all photos by trying to load them
        async function detectPhotos() {
            const photos = [];
            let photoNumber = 1;
            const maxPhotosToCheck = 500; // Safety limit
            
            // Try loading photos starting from photo1.jpg
            while (photoNumber <= maxPhotosToCheck) {
                const img = new Image();
                const photoExists = await new Promise((resolve) => {
                    img.onload = () => resolve(true);
                    img.onerror = () => resolve(false);
                    img.src = `photos/photo${photoNumber}.jpg`;
                });
                
                if (photoExists) {
                    photos.push(`photo${photoNumber}.jpg`);
                    photoNumber++;
                } else {
                    break; // Stop when we find a photo that doesn't exist
                }
            }
            
            // Reverse array so newest (highest number) is first
            return photos.reverse();
        }

        async function initGallery() {
            allPhotos = await detectPhotos();
            if (allPhotos.length === 0) {
                document.getElementById('photoGrid').innerHTML = '<p style="color: white; text-align: center; font-family: DotGothic16;">No photos found. Upload photos to the photos/ folder named photo1.jpg, photo2.jpg, etc.</p>';
                document.getElementById('pagination').innerHTML = '';
                return;
            }
            photosLoaded = true;
            renderPhotos();
            renderPagination();
        }

        function renderPhotos() {
            const startIndex = (currentPage - 1) * photosPerPage;
            const endIndex = startIndex + photosPerPage;
            const photosToShow = allPhotos.slice(startIndex, endIndex);

            const photoGrid = document.getElementById('photoGrid');
            photoGrid.innerHTML = photosToShow.map(photo => `
                <div class="photo-item" onclick="openLightbox('photos/${photo}')">
                    <img src="photos/${photo}" alt="Photography">
                </div>
            `).join('');
        }

        function renderPagination() {
            const totalPages = Math.ceil(allPhotos.length / photosPerPage);
            const pagination = document.getElementById('pagination');
            
            let paginationHTML = `
                <button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>
                    ← Prev
                </button>
            `;

            // Show page numbers
            for (let i = 1; i <= totalPages; i++) {
                paginationHTML += `
                    <span class="page-number ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">
                        ${i}
                    </span>
                `;
            }

            paginationHTML += `
                <button onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>
                    Next →
                </button>
            `;

            pagination.innerHTML = paginationHTML;
        }

        function changePage(page) {
            const totalPages = Math.ceil(allPhotos.length / photosPerPage);
            if (page < 1 || page > totalPages) return;
            
            currentPage = page;
            renderPhotos();
            renderPagination();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Lightbox functionality
        function openLightbox(photoSrc) {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightboxImg');
            lightboxImg.src = photoSrc;
            lightbox.classList.add('active');
        }

        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('active');
        }

        // Event listeners
        document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
        document.getElementById('lightbox').addEventListener('click', function(e) {
            if (e.target === this) {
                closeLightbox();
            }
        });

        // Initial render
        document.addEventListener('DOMContentLoaded', function() {
            initGallery();
        });
    </script>
</body>
</html>
